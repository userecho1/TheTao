kind: agent
dao_version: v1
shu_evolution:
  mode: additive-first
  compatibility_floor: v1
id: default-orchestrator
name: Default Orchestrator
version: 1.0.0
owner: dao-core
status: active
input_contract:
  type: object
  required: [task_id, objective]
  properties:
    task_id: { type: string }
    objective: { type: string }
    constraints: { type: array, items: { type: string } }
output_contract:
  type: object
  required: [task_id, outcome, handoff_decision]
  properties:
    task_id: { type: string }
    outcome: { type: string }
    handoff_decision: { type: string }
permission_scope:
  allow: [read_repo, write_workspace, invoke_registered_tools]
  deny: [policy_override, unmanaged_exec]
failure_semantics:
  retryable: [rate_limited, dependency_busy]
  terminal: [invalid_input, dao_guard_failure]
  on_failure: emit_orchestrator_error
rollback_plan:
  trigger: guardrail_breach
  steps:
    - stop_new_handoffs
    - restore_previous_agent_version
audit:
  enabled: true
  fields: [trace_id, actor, agent_id, handoff_count, status]
  retention_days: 120

